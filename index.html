<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>סוכן אוטונומי - בית התלמוד</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#0a0e1a; --card:#131826; --border:#2a3441; --accent:#00d4ff; --good:#4ade80; --warn:#fbbf24; --bad:#f87171; --muted:#6a7a8a; }
* { box-sizing: border-box; }
body { font-family: 'Heebo', Arial, sans-serif; background: var(--bg); color: #e0e6ed; margin: 0; padding: 20px; min-height: 100vh; }
h1 { color: var(--accent); margin-bottom: 5px; font-size: 28px; }
.subtitle { color: var(--muted); font-size: 13px; margin-bottom: 25px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; margin-bottom: 20px; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
.card h3 { margin: 0 0 12px 0; color: var(--accent); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.big-num { font-size: 36px; font-weight: 700; color: var(--good); line-height: 1; }
.label { color: var(--muted); font-size: 12px; margin-top: 6px; }
.row { display: flex; justify-content: space-between; margin: 6px 0; font-size: 14px; }
.row .v { color: var(--good); font-weight: 600; }
.bad { color: var(--bad) !important; }
.warn { color: var(--warn) !important; }
.log { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 15px; max-height: 600px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.7; }
.log .line { padding: 3px 0; border-bottom: 1px solid #1a2330; }
.queue-item { padding: 10px; background: #1a2330; margin: 6px 0; border-radius: 6px; border-right: 4px solid var(--accent); }
.queue-item .prio { display: inline-block; background: var(--accent); color: var(--bg); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-left: 10px; }
.online { color: var(--good); }
.offline { color: var(--bad); }
.warning { color: var(--warn); }
small { color: var(--muted); }
.status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-left: 6px; vertical-align: middle; }
.dot-on { background: var(--good); box-shadow: 0 0 8px var(--good); animation: pulse 2s infinite; }
.dot-off { background: var(--bad); }
@keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }
.footer { text-align: center; margin-top: 30px; color: var(--muted); font-size: 12px; }
.empty { text-align: center; color: var(--muted); padding: 20px; }
.tag { display: inline-block; background: rgba(0,212,255,0.1); color: var(--accent); padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-left: 4px; }
.done-item { padding: 10px; background: #1a2330; margin: 6px 0; border-radius: 6px; border-right: 4px solid var(--good); }
.done-item .title { font-weight: 600; color: #e0e6ed; font-size: 13px; }
.done-item .summary { color: var(--muted); font-size: 11px; margin-top: 4px; line-height: 1.5; }
.done-item .meta { font-size: 10px; color: var(--muted); margin-top: 4px; }
.done-item .partial-badge { display: inline-block; background: rgba(251,191,36,0.15); color: var(--warn); padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-right: 6px; }
.done-item .done-badge { display: inline-block; background: rgba(74,222,128,0.15); color: var(--good); padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-right: 6px; }
.chat-msg { padding: 8px 10px; background: #1a2330; margin: 6px 0; border-radius: 6px; border-right: 3px solid var(--muted); }
.chat-msg.q { border-right-color: var(--warn); }
.chat-msg.a { border-right-color: var(--accent); }
.chat-msg.i { border-right-color: #a78bfa; }
.chat-msg .who { font-size: 11px; color: var(--accent); font-weight: 600; }
.chat-msg .ts { font-size: 10px; color: var(--muted); margin-right: 6px; }
.chat-msg .body { color: #e0e6ed; font-size: 12px; margin-top: 4px; line-height: 1.5; white-space: pre-wrap; max-height: 80px; overflow: hidden; }
</style>
</head>
<body>

<h1>🤖 סוכן אוטונומי - בית התלמוד</h1>
<div class="subtitle">
  עדכון אחרון: <span id="last-update">טוען...</span>
  · <span class="status-dot dot-off" id="hb-dot"></span>
  <span id="hb-status">בודק...</span>
</div>

<div class="grid">
  <div class="card">
    <h3>סטטוס מערכת</h3>
    <div id="status-block">טוען...</div>
  </div>
  <div class="card">
    <h3>תור משימות</h3>
    <div id="backlog-block">טוען...</div>
  </div>
  <div class="card">
    <h3>סריקת מחשב</h3>
    <div id="scan-block">טוען...</div>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h3>בתור הקרוב</h3>
    <div id="next-block">טוען...</div>
  </div>
  <div class="card" style="grid-column: span 2;">
    <h3>מה עשיתי לאחרונה</h3>
    <div id="done-block">טוען...</div>
  </div>
</div>

<div class="grid">
  <div class="card" style="grid-column: span 2;">
    <h3>התייעצויות צוות (claude-main · voice · claw)</h3>
    <div id="chat-block">טוען...</div>
  </div>
  <div class="card">
    <h3>יומן חי</h3>
    <div class="log" id="log-block">טוען...</div>
  </div>
</div>

<div class="footer">
  עדכון אוטומטי כל 30 שניות · מקור: GitHub
</div>

<script>
async function refresh() {
  try {
    const r = await fetch('state.json?t=' + Date.now());
    const s = await r.json();

    document.getElementById('last-update').textContent =
      new Date(s.timestamp).toLocaleString('he-IL');

    // dot
    const hbAge = s.heartbeat_age;
    const dot = document.getElementById('hb-dot');
    const hbStatus = document.getElementById('hb-status');
    if (hbAge === null) {
      dot.className = 'status-dot dot-off';
      hbStatus.textContent = 'הסוכן לא רץ';
      hbStatus.className = 'offline';
    } else if (hbAge < 120) {
      dot.className = 'status-dot dot-on';
      hbStatus.textContent = `פעיל (לפני ${Math.round(hbAge)}s)`;
      hbStatus.className = 'online';
    } else {
      dot.className = 'status-dot dot-off';
      hbStatus.textContent = `לא פעיל (${Math.round(hbAge)}s)`;
      hbStatus.className = 'warning';
    }

    const sys = s.system || {};
    document.getElementById('status-block').innerHTML = `
      <div class="row"><span class="label">CPU:</span> <span class="v ${sys.cpu>80?'bad':sys.cpu>50?'warn':''}">${(sys.cpu||0).toFixed(0)}%</span></div>
      <div class="row"><span class="label">זיכרון:</span> <span class="v">${(sys.memory||0).toFixed(0)}%</span></div>
      <div class="row"><span class="label">דיסק C:</span> <span class="v">${(sys.disk_c||0).toFixed(0)}%</span></div>
    `;

    const bl = s.backlog;
    document.getElementById('backlog-block').innerHTML = `
      <div class="big-num">${bl.pending}</div>
      <div class="label">ממתינות בתור</div>
      <div class="row"><span class="label">בעבודה:</span> <span class="v warn">${bl.in_progress}</span></div>
      <div class="row"><span class="label">הושלמו:</span> <span class="v online">${bl.done}</span></div>
      <div class="row"><span class="label">נכשלו:</span> <span class="v bad">${bl.failed || 0}</span></div>
    `;

    const sc = s.scan || {};
    document.getElementById('scan-block').innerHTML = `
      <div class="big-num">${(sc.files || 0).toLocaleString('he-IL')}</div>
      <div class="label">קבצים זוהו</div>
      <div class="row"><span class="label">פרויקטים:</span> <span class="v">${sc.projects || 0}</span></div>
      <div class="row"><span class="label">נסרק:</span> <small>${sc.last_dir ? '...' + sc.last_dir.slice(-40) : '?'}</small></div>
    `;

    const next = bl.next || [];
    document.getElementById('next-block').innerHTML = next.length === 0 ?
      '<div class="empty">אין משימות בתור 🎉</div>' :
      next.map(t => `<div class="queue-item"><span class="prio">P${t.priority}</span>${t.title}</div>`).join('');

    // done
    const esc = (str) => String(str || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const fmtTs = (ts) => {
      if (!ts) return '';
      try { return new Date(ts).toLocaleString('he-IL', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
      catch { return ts; }
    };
    const done = s.done_tasks || [];
    document.getElementById('done-block').innerHTML = done.length === 0 ?
      '<div class="empty">עדיין כלום</div>' :
      done.map(t => `
        <div class="done-item">
          <div class="title"><span class="${t.status === 'done' ? 'done-badge' : 'partial-badge'}">${t.status === 'done' ? '✅ הושלם' : '⏳ חלקית'}</span><span class="prio">P${esc(t.priority)}</span> ${esc(t.title)}</div>
          <div class="summary">${esc(t.summary)}</div>
          <div class="meta">${fmtTs(t.updated)}</div>
        </div>`).join('');

    // team chat
    const chat = s.team_chat || [];
    const typeMap = {question:'q', answer:'a', insight:'i', update:''};
    const labelMap = {question:'שאלה', answer:'תשובה', insight:'תובנה', update:'עדכון'};
    document.getElementById('chat-block').innerHTML = chat.length === 0 ?
      '<div class="empty">אין התייעצויות אחרונות</div>' :
      chat.slice().reverse().map(m => `
        <div class="chat-msg ${typeMap[m.type] || ''}">
          <span class="who">${esc(m.author)}</span>
          <span class="ts">${fmtTs(m.ts)} · ${labelMap[m.type] || m.type}</span>
          <div class="body">${esc(m.content)}</div>
        </div>`).join('');

    const log = s.recent_log || [];
    // סנן רעש "CPU גבוה (XX%) — ממתין"
    const filtered = log.filter(l => !/CPU גבוה .* — ממתין/.test(l) && !/`target`=\d+/.test(l));
    document.getElementById('log-block').innerHTML =
      filtered.slice().reverse().slice(0, 80).map(l => `<div class="line">${esc(l)}</div>`).join('') ||
      '<div class="empty">אין רישומים</div>';
  } catch (e) {
    console.error(e);
    document.getElementById('last-update').textContent = 'שגיאה';
  }
}

refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
